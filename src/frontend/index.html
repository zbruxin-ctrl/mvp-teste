<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVP Automação</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .full { grid-column: 1 / -1; }
    h1 { color: #333; margin-bottom: 16px; font-size: 22px; }
    h2 { color: #555; margin-bottom: 14px; font-size: 17px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 14px; transition: border-color .2s; }
    input:focus, select:focus { outline: none; border-color: #4f46e5; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; margin-bottom: 10px; }
    .btn-primary   { background: #4f46e5; color: #fff; }
    .btn-primary:hover:not(:disabled)   { background: #3730a3; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: #4b5563; }
    .btn-danger    { background: #ef4444; color: #fff; }
    .btn-danger:hover:not(:disabled)    { background: #dc2626; }
    .btn-warning   { background: #f59e0b; color: #fff; }
    .btn-warning:hover:not(:disabled)   { background: #d97706; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status { padding: 12px; border-radius: 8px; text-align: center; font-weight: 700; margin-bottom: 14px; font-size: 15px; }
    .status.idle    { background: #d1fae5; color: #065f46; }
    .status.running { background: #fef3c7; color: #92400e; }
    .status.warn    { background: #fef3c7; color: #92400e; }
    .status.error   { background: #fee2e2; color: #991b1b; }
    .stats { display: flex; gap: 12px; margin-bottom: 14px; }
    .stat { flex: 1; text-align: center; background: #f9fafb; padding: 12px; border-radius: 10px; }
    .stat-value { font-size: 26px; font-weight: 700; color: #4f46e5; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .save-toast { display: none; font-size: 12px; color: #15803d; font-weight: 600; margin-top: -10px; margin-bottom: 10px; text-align: center; }
    .save-toast.show { display: block; }

    /* ── Logs ── */
    .logs { max-height: 320px; overflow-y: auto; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12.5px; line-height: 1.6; }
    .log-entry { margin-bottom: 2px; padding: 1px 4px; border-radius: 4px; }
    .log-info    { color: #0369a1; }
    .log-warn    { color: #d97706; }
    .log-error   { color: #dc2626; }
    .log-success { color: #15803d; }
    .log-kyc {
      color: #7c3aed;
      background: #f5f3ff;
      border-left: 3px solid #7c3aed;
      padding-left: 8px;
      font-weight: 600;
    }
    .log-kyc-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 800;
      padding: 1px 6px;
      border-radius: 10px;
      margin-right: 5px;
      vertical-align: middle;
    }
    .badge-socure  { background: #dbeafe; color: #1d4ed8; }
    .badge-veriff  { background: #ede9fe; color: #6d28d9; }
    .badge-unknown { background: #f3f4f6; color: #374151; }

    /* ── KYC Panel ── */
    .kyc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 12px; }
    .kyc-card { border-radius: 10px; padding: 16px; border: 2px solid #e5e7eb; transition: border-color .3s; }
    .kyc-card.weak      { border-color: #e5e7eb; background: #f9fafb; }
    .kyc-card.likely    { border-color: #f59e0b; background: #fffbeb; }
    .kyc-card.confirmed { border-color: #10b981; background: #ecfdf5; }
    .kyc-card.inactive  { border-color: #e5e7eb; background: #f9fafb; opacity: .55; }
    .kyc-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
    .kyc-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .badge-weak      { background: #e5e7eb; color: #6b7280; }
    .badge-likely    { background: #fef3c7; color: #92400e; }
    .badge-confirmed { background: #d1fae5; color: #065f46; }
    .kyc-score { font-size: 28px; font-weight: 800; color: #4f46e5; margin: 6px 0; }
    .kyc-score small { font-size: 13px; font-weight: 400; color: #6b7280; }
    .kyc-signals { font-size: 11.5px; font-family: monospace; color: #555; max-height: 100px; overflow-y: auto; }
    .kyc-signal-row { border-top: 1px solid #e5e7eb; padding-top: 4px; margin-top: 4px; }
    .kyc-none { color: #9ca3af; font-size: 13px; text-align: center; padding: 20px 0; }

    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } .kyc-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="grid">

    <!-- Config -->
    <div class="panel">
      <h1>⚙️ Configurações</h1>
      <label for="cadastroUrl">URL de Cadastro</label>
      <input id="cadastroUrl" placeholder="https://example.com/cadastro" />
      <label for="tempMailApiKey">Temp-Mail API Key</label>
      <input id="tempMailApiKey" type="password" placeholder="sua-api-key" />
      <label for="inviteCode">Código de Indicação</label>
      <input id="inviteCode" placeholder="ex: gkd2n7c" />
      <label for="otpTimeout">Timeout OTP (ms)</label>
      <input id="otpTimeout" type="number" value="30000" />
      <label for="cycleInterval">Intervalo entre ciclos (ms)</label>
      <input id="cycleInterval" type="number" value="60000" />
      <label for="extraDelay">Delay extra entre ações (ms)</label>
      <input id="extraDelay" type="number" value="2000" />
      <label for="parallelCycles">Ciclos simultâneos</label>
      <input id="parallelCycles" type="number" value="1" min="1" max="10" />
      <label for="headless">Modo Headless</label>
      <select id="headless">
        <option value="true">Sim (oculto)</option>
        <option value="false">Não (visível)</option>
      </select>
      <button class="btn-secondary" onclick="saveConfig()">💾 Salvar Config</button>
      <div class="save-toast" id="saveToast">✅ Configurações salvas!</div>
    </div>

    <!-- Controles -->
    <div class="panel">
      <h2>🎮 Controles</h2>
      <button class="btn-primary"   id="startBtn"     onclick="startLoop()">▶️ Iniciar Loop</button>
      <button class="btn-primary"   id="startOnceBtn" onclick="startOnce()">🔄 Executar 1 Ciclo</button>
      <button class="btn-danger"    id="stopBtn"      onclick="stopBot()" disabled>⏹️ Parar</button>
      <button class="btn-secondary" onclick="clearLogs()">🗑️ Limpar Logs</button>
      <button class="btn-warning"   onclick="clearKyc()">🔍 Limpar KYC</button>
    </div>

    <!-- Status -->
    <div class="panel full">
      <h2>📊 Status</h2>
      <div id="status" class="status idle">🟢 Inativo</div>
      <div class="stats">
        <div class="stat"><div id="cyclesCompleted" class="stat-value">0</div><div class="stat-label">Ciclos OK</div></div>
        <div class="stat"><div id="cyclesTotal"     class="stat-value">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div id="activeParallel"  class="stat-value">0</div><div class="stat-label">Ativos agora</div></div>
        <div class="stat"><div id="statusText"      class="stat-value">-</div><div class="stat-label">Status</div></div>
      </div>
      <div class="logs" id="logs"></div>
    </div>

    <!-- KYC Detector -->
    <div class="panel full">
      <h2>🔍 KYC Detector — Socure / Veriff</h2>
      <div id="kyc-panel">
        <div class="kyc-none">Nenhum sinal KYC detectado ainda. Inicie um ciclo para monitorar.</div>
      </div>
    </div>

  </div>

  <script>
    const STATUS_MAP = {
      STOPPED:     { emoji: '🟢', text: 'Parado',     color: 'idle' },
      STARTING:    { emoji: '🔄', text: 'Iniciando',  color: 'running' },
      RUNNING:     { emoji: '⚡', text: 'Executando', color: 'running' },
      WAITING_OTP: { emoji: '⏳', text: 'OTP',        color: 'running' },
      STOPPING:    { emoji: '🛑', text: 'Parando',    color: 'warn' },
      ERROR:       { emoji: '❌', text: 'Erro',       color: 'error' },
    };

    const KYC_ICONS  = { Socure: '🛡️', Veriff: '🪪' };
    const KYC_COLORS = { WEAK: 'weak', LIKELY: 'likely', CONFIRMED: 'confirmed' };
    const BADGE_COLORS = { WEAK: 'badge-weak', LIKELY: 'badge-likely', CONFIRMED: 'badge-confirmed' };

    // ── Flag: evita sobrescrever campos enquanto o usuário está digitando ──────
    // Cada campo tem seu próprio timer de "está digitando"
    var _dirtyFields = {};
    var _dirtyTimers = {};

    function markDirty(fieldId) {
      _dirtyFields[fieldId] = true;
      clearTimeout(_dirtyTimers[fieldId]);
      // Considera o campo "limpo" 5 segundos após o último keystroke
      _dirtyTimers[fieldId] = setTimeout(function() {
        _dirtyFields[fieldId] = false;
      }, 5000);
    }

    // Registra listener de "digitando" em todos os campos de config
    var CONFIG_FIELDS = ['cadastroUrl','tempMailApiKey','inviteCode','otpTimeout','cycleInterval','extraDelay','parallelCycles','headless'];
    CONFIG_FIELDS.forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.addEventListener('input', function() { markDirty(id); });
    });

    async function api(path, method, body) {
      var opts = { method: method || 'GET' };
      if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
      var res = await fetch('/api' + path, opts);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    function getConfig() {
      return {
        cadastroUrl:    document.getElementById('cadastroUrl').value,
        tempMailApiKey: document.getElementById('tempMailApiKey').value,
        inviteCode:     document.getElementById('inviteCode').value,
        otpTimeout:     parseInt(document.getElementById('otpTimeout').value, 10),
        cycleInterval:  parseInt(document.getElementById('cycleInterval').value, 10),
        extraDelay:     parseInt(document.getElementById('extraDelay').value, 10),
        parallelCycles: parseInt(document.getElementById('parallelCycles').value, 10) || 1,
        headless:       document.getElementById('headless').value === 'true',
      };
    }

    function applyConfig(cfg) {
      if (!cfg) return;
      // Só atualiza campos que o usuário NÃO está editando no momento
      function setIfClean(id, val) {
        if (!_dirtyFields[id]) {
          var el = document.getElementById(id);
          if (el && el.value !== String(val ?? '')) el.value = val ?? '';
        }
      }
      setIfClean('cadastroUrl',    cfg.cadastroUrl    || '');
      setIfClean('tempMailApiKey', cfg.tempMailApiKey || '');
      setIfClean('inviteCode',     cfg.inviteCode     || '');
      setIfClean('otpTimeout',     cfg.otpTimeout     || 30000);
      setIfClean('cycleInterval',  cfg.cycleInterval  || 60000);
      setIfClean('extraDelay',     cfg.extraDelay     || 2000);
      setIfClean('parallelCycles', cfg.parallelCycles || 1);
      setIfClean('headless',       String(!!cfg.headless));
    }

    async function saveConfig() {
      // Ao salvar, limpa todos os flags de dirty imediatamente
      CONFIG_FIELDS.forEach(function(id) {
        _dirtyFields[id] = false;
        clearTimeout(_dirtyTimers[id]);
      });
      await api('/config', 'POST', getConfig());
      var toast = document.getElementById('saveToast');
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2500);
    }

    async function startLoop()   { await api('/start',      'POST', { config: getConfig() }); }
    async function startOnce()   { await api('/start-once', 'POST', { config: getConfig() }); }
    async function stopBot()     { await api('/stop',       'POST'); }
    async function clearLogs()   { await api('/logs/clear', 'POST'); }
    async function clearKyc()    { await api('/kyc/clear',  'POST'); renderKyc({}); }

    // ── KYC render ──────────────────────────────────────────────────────────
    function renderKyc(kycState) {
      var panel = document.getElementById('kyc-panel');
      var providers = ['Socure', 'Veriff'];
      var hasAny = providers.some(function(p) { return !!kycState[p]; });

      if (!hasAny) {
        panel.innerHTML = '<div class="kyc-none">Nenhum sinal KYC detectado ainda. Inicie um ciclo para monitorar.</div>';
        return;
      }

      var html = '<div class="kyc-grid">';
      for (var i = 0; i < providers.length; i++) {
        var name = providers[i];
        var data = kycState[name];
        if (!data) {
          html += '<div class="kyc-card inactive"><div class="kyc-name">' + (KYC_ICONS[name] || '🔍') + ' ' + name + ' <span class="kyc-badge badge-weak">NÃO DETECTADO</span></div><div style="color:#9ca3af;font-size:13px;margin-top:8px">Nenhum sinal capturado</div></div>';
          continue;
        }
        var level    = data.level || 'WEAK';
        var cardCls  = KYC_COLORS[level]  || 'weak';
        var badgeCls = BADGE_COLORS[level] || 'badge-weak';
        var signals  = (data.signals || []).slice(0, 5);
        var sigHtml  = signals.map(function(s) {
          return '<div class="kyc-signal-row">⚡ ' + s.time + ' — ' + s.source + ' (+' + s.weight + ')' +
            (s.url ? '<br><span style="color:#6b7280">' + s.url.substring(0, 80) + '</span>' : '') + '</div>';
        }).join('');
        html += '<div class="kyc-card ' + cardCls + '">' +
          '<div class="kyc-name">' + (KYC_ICONS[name] || '🔍') + ' ' + name + ' <span class="kyc-badge ' + badgeCls + '">' + level + '</span></div>' +
          '<div class="kyc-score">' + data.score + ' <small>pts</small></div>' +
          '<div class="kyc-signals">' + sigHtml + '</div>' +
          '</div>';
      }
      html += '</div>';
      panel.innerHTML = html;
    }

    // ── Log render com destaque KYC ─────────────────────────────────────────
    function renderLogs(logs) {
      var logsEl = document.getElementById('logs');
      var html = logs.map(function(l) {
        var time   = new Date(l.timestamp).toLocaleTimeString();
        var cycle  = l.cycle ? '#' + l.cycle + ' ' : '';
        var msg    = l.message;

        if (l.level === 'kyc') {
          var providerMatch = msg.match(/^\[([A-Za-z]+)\]/);
          var provider = providerMatch ? providerMatch[1] : 'KYC';
          var badgeCls = provider === 'Socure' ? 'badge-socure' : provider === 'Veriff' ? 'badge-veriff' : 'badge-unknown';
          return '<div class="log-entry log-kyc">[' + time + '] ' + cycle +
            '<span class="log-kyc-badge ' + badgeCls + '">' + provider + '</span>' + msg + '</div>';
        }

        return '<div class="log-entry log-' + l.level + '">[' + time + '] ' + cycle + msg + '</div>';
      }).join('');
      logsEl.innerHTML = html;
      // Auto-scroll para o fim
      logsEl.scrollTop = logsEl.scrollHeight;
    }

    // ── Main update loop ─────────────────────────────────────────────────────
    async function updateUI() {
      try {
        var results = await Promise.all([
          api('/status'),
          api('/logs'),
          api('/kyc'),
        ]);
        var state    = results[0];
        var logs     = results[1];
        var kycState = results[2];

        var info     = STATUS_MAP[state.status] || STATUS_MAP.STOPPED;
        var statusEl = document.getElementById('status');
        statusEl.className   = 'status ' + info.color;
        statusEl.textContent = info.emoji + ' ' + info.text;

        document.getElementById('statusText').textContent      = state.status || '-';
        document.getElementById('cyclesCompleted').textContent = String(state.cyclesCompleted || 0);
        document.getElementById('cyclesTotal').textContent     = String(state.cyclesTotal     || 0);
        document.getElementById('activeParallel').textContent  = String(state.activeParallel  || 0);

        // Só aplica config do servidor se o usuário não estiver digitando
        applyConfig(state.config);

        var active = ['RUNNING', 'STARTING', 'WAITING_OTP'].includes(state.status);
        document.getElementById('startBtn').disabled     = active;
        document.getElementById('startOnceBtn').disabled = active;
        document.getElementById('stopBtn').disabled      = !active && state.status !== 'STOPPING';

        renderLogs(logs);
        renderKyc(kycState);
      } catch (e) {
        console.error('updateUI:', e);
      }
    }

    setInterval(updateUI, 1000);
    updateUI();
  </script>
</body>
</html>
