<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MVP Automação</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
    .panel { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .full { grid-column: 1 / -1; }
    h1 { color: #333; margin-bottom: 16px; font-size: 22px; }
    h2 { color: #555; margin-bottom: 14px; font-size: 17px; }
    label { display: block; font-size: 13px; color: #555; margin-bottom: 4px; }
    input, select { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 14px; transition: border-color .2s; }
    input:focus, select:focus { outline: none; border-color: #4f46e5; }
    button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all .2s; margin-bottom: 10px; }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #3730a3; }
    .btn-secondary { background: #6b7280; color: #fff; }
    .btn-secondary:hover:not(:disabled) { background: #4b5563; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status { padding: 12px; border-radius: 8px; text-align: center; font-weight: 700; margin-bottom: 14px; font-size: 15px; }
    .status.idle { background: #d1fae5; color: #065f46; }
    .status.running { background: #fef3c7; color: #92400e; }
    .status.warn { background: #fef3c7; color: #92400e; }
    .status.error { background: #fee2e2; color: #991b1b; }
    .stats { display: flex; gap: 12px; margin-bottom: 14px; }
    .stat { flex: 1; text-align: center; background: #f9fafb; padding: 12px; border-radius: 10px; }
    .stat-value { font-size: 26px; font-weight: 700; color: #4f46e5; }
    .stat-label { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .logs { max-height: 380px; overflow-y: auto; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 12.5px; line-height: 1.5; }
    .log-entry { margin-bottom: 3px; }
    .log-info { color: #0369a1; }
    .log-warn { color: #d97706; }
    .log-error { color: #dc2626; }
    .log-success { color: #15803d; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="grid">

    <!-- Config -->
    <div class="panel">
      <h1>⚙️ Configurações</h1>
      <label for="cadastroUrl">URL de Cadastro</label>
      <input id="cadastroUrl" placeholder="https://example.com/cadastro" />
      <label for="tempMailApiKey">Temp-Mail API Key</label>
      <input id="tempMailApiKey" type="password" placeholder="sua-api-key" />
      <label for="otpTimeout">Timeout OTP (ms)</label>
      <input id="otpTimeout" type="number" value="30000" />
      <label for="cycleInterval">Intervalo entre ciclos (ms)</label>
      <input id="cycleInterval" type="number" value="60000" />
      <label for="extraDelay">Delay extra entre ações (ms)</label>
      <input id="extraDelay" type="number" value="2000" />
      <label for="headless">Modo Headless</label>
      <select id="headless">
        <option value="true">Sim (oculto)</option>
        <option value="false">Não (visível)</option>
      </select>
      <button class="btn-secondary" onclick="saveConfig()">💾 Salvar Config</button>
    </div>

    <!-- Controles -->
    <div class="panel">
      <h2>🎮 Controles</h2>
      <button class="btn-primary" id="startBtn" onclick="startLoop()">▶️ Iniciar Loop</button>
      <button class="btn-primary" id="startOnceBtn" onclick="startOnce()">🔄 Executar 1 Ciclo</button>
      <button class="btn-danger" id="stopBtn" onclick="stopBot()" disabled>⏹️ Parar</button>
      <button class="btn-secondary" onclick="clearLogs()">🗑️ Limpar Logs</button>
    </div>

    <!-- Status -->
    <div class="panel full">
      <h2>📊 Status</h2>
      <div id="status" class="status idle">🟢 Inativo</div>
      <div class="stats">
        <div class="stat"><div id="cyclesCompleted" class="stat-value">0</div><div class="stat-label">Ciclos OK</div></div>
        <div class="stat"><div id="cyclesTotal" class="stat-value">0</div><div class="stat-label">Total</div></div>
        <div class="stat"><div id="statusText" class="stat-value">-</div><div class="stat-label">Status</div></div>
      </div>
      <div class="logs" id="logs"></div>
    </div>

  </div>

  <script>
    const STATUS_MAP = {
      STOPPED:     { emoji: '🟢', text: 'Parado',     color: 'idle' },
      STARTING:    { emoji: '🔄', text: 'Iniciando',  color: 'running' },
      RUNNING:     { emoji: '⚡', text: 'Executando', color: 'running' },
      WAITING_OTP: { emoji: '⏳', text: 'OTP',        color: 'running' },
      STOPPING:    { emoji: '🛑', text: 'Parando',    color: 'warn' },
      ERROR:       { emoji: '❌', text: 'Erro',       color: 'error' },
    };

    async function api(path, method, body) {
      const opts = { method: method || 'GET' };
      if (body) { opts.headers = { 'Content-Type': 'application/json' }; opts.body = JSON.stringify(body); }
      const res = await fetch('/api' + path, opts);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    function getConfig() {
      return {
        cadastroUrl:    document.getElementById('cadastroUrl').value,
        tempMailApiKey: document.getElementById('tempMailApiKey').value,
        otpTimeout:     parseInt(document.getElementById('otpTimeout').value, 10),
        cycleInterval:  parseInt(document.getElementById('cycleInterval').value, 10),
        extraDelay:     parseInt(document.getElementById('extraDelay').value, 10),
        headless:       document.getElementById('headless').value === 'true',
      };
    }

    function applyConfig(cfg) {
      if (!cfg) return;
      document.getElementById('cadastroUrl').value    = cfg.cadastroUrl    || '';
      document.getElementById('tempMailApiKey').value = cfg.tempMailApiKey || '';
      document.getElementById('otpTimeout').value     = cfg.otpTimeout     || 30000;
      document.getElementById('cycleInterval').value  = cfg.cycleInterval  || 60000;
      document.getElementById('extraDelay').value     = cfg.extraDelay     || 2000;
      document.getElementById('headless').value       = String(!!cfg.headless);
    }

    async function saveConfig() { await api('/config', 'POST', getConfig()); addLog('success', '💾 Config salva'); }
    async function startLoop()  { await api('/start',  'POST', { config: getConfig() }); }
    async function startOnce()  { await api('/start-once', 'POST', { config: getConfig() }); }
    async function stopBot()    { await api('/stop',   'POST'); }
    async function clearLogs()  { await api('/logs/clear', 'POST'); }

    function addLog(level, message) {
      const el = document.getElementById('logs');
      const div = document.createElement('div');
      div.className = 'log-entry log-' + level;
      div.textContent = '[' + new Date().toLocaleTimeString() + '] ' + message;
      el.insertBefore(div, el.firstChild);
    }

    async function updateUI() {
      try {
        const [state, logs] = await Promise.all([api('/status'), api('/logs')]);
        const info = STATUS_MAP[state.status] || STATUS_MAP.STOPPED;

        const statusEl = document.getElementById('status');
        statusEl.className = 'status ' + info.color;
        statusEl.textContent = info.emoji + ' ' + info.text;

        document.getElementById('statusText').textContent        = state.status || '-';
        document.getElementById('cyclesCompleted').textContent   = String(state.cyclesCompleted || 0);
        document.getElementById('cyclesTotal').textContent       = String(state.cyclesTotal || 0);

        applyConfig(state.config);

        const active = ['RUNNING','STARTING','WAITING_OTP'].includes(state.status);
        document.getElementById('startBtn').disabled     = active;
        document.getElementById('startOnceBtn').disabled = active;
        document.getElementById('stopBtn').disabled      = !active && state.status !== 'STOPPING';

        const logsEl = document.getElementById('logs');
        logsEl.innerHTML = logs.map(function(l) {
          var c = l.cycle ? '#' + l.cycle + ' ' : '';
          return '<div class="log-entry log-' + l.level + '">[' + new Date(l.timestamp).toLocaleTimeString() + '] ' + c + l.message + '</div>';
        }).join('');
      } catch (e) {
        console.error('updateUI:', e);
      }
    }

    setInterval(updateUI, 1000);
    updateUI();
  </script>
</body>
</html>
