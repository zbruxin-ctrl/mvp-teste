<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contas Salvas — MVP Teste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>
  <style>
    /* ── Design Tokens ────────────────────────────────── */
    :root {
      --font-body: 'Inter', system-ui, sans-serif;
      --text-xs:   clamp(0.75rem,  0.7rem  + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem  + 0.35vw, 1rem);
      --text-base: clamp(1rem,     0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem    + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem,   1.2rem  + 1.25vw, 2.25rem);
      --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
      --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
      --radius-sm: 0.375rem; --radius-md: 0.5rem;
      --radius-lg: 0.75rem;  --radius-xl: 1rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    [data-theme="dark"] {
      --color-bg:              #0f1117;
      --color-surface:         #161b22;
      --color-surface-2:       #1c2128;
      --color-surface-offset:  #21262d;
      --color-border:          #30363d;
      --color-divider:         #21262d;
      --color-text:            #e6edf3;
      --color-text-muted:      #8b949e;
      --color-text-faint:      #484f58;
      --color-primary:         #58a6ff;
      --color-primary-hover:   #79b8ff;
      --color-success:         #3fb950;
      --color-success-bg:      #0d2619;
      --color-warning:         #d29922;
      --color-warning-bg:      #271f00;
      --color-error:           #f85149;
      --color-error-bg:        #2d1111;
      --color-purple:          #bc8cff;
      --color-purple-bg:       #1e1028;
      --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.4);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.5);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.6);
    }

    [data-theme="light"] {
      --color-bg:              #f6f8fa;
      --color-surface:         #ffffff;
      --color-surface-2:       #f6f8fa;
      --color-surface-offset:  #eaeef2;
      --color-border:          #d0d7de;
      --color-divider:         #eaeef2;
      --color-text:            #1f2328;
      --color-text-muted:      #57606a;
      --color-text-faint:      #8c959f;
      --color-primary:         #0969da;
      --color-primary-hover:   #0550ae;
      --color-success:         #1a7f37;
      --color-success-bg:      #dafbe1;
      --color-warning:         #9a6700;
      --color-warning-bg:      #fff8c5;
      --color-error:           #cf222e;
      --color-error-bg:        #ffebe9;
      --color-purple:          #8250df;
      --color-purple-bg:       #fbefff;
      --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.1);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.12);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.15);
    }

    /* ── Reset ────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-sm);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
    }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    input, textarea, select { font: inherit; color: inherit; }
    a { color: var(--color-primary); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ───────────────────────────────────────── */
    .sidebar {
      width: 220px;
      min-height: 100dvh;
      background: var(--color-surface);
      border-right: 1px solid var(--color-border);
      display: flex;
      flex-direction: column;
      padding: var(--space-4) 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100dvh;
      overflow-y: auto;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--color-divider);
      margin-bottom: var(--space-3);
    }
    .sidebar-logo svg { color: var(--color-primary); flex-shrink: 0; }
    .sidebar-logo span { font-size: var(--text-sm); font-weight: 600; letter-spacing: -0.02em; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      margin: 1px var(--space-2);
      color: var(--color-text-muted);
      font-size: var(--text-xs);
      font-weight: 500;
      transition: background var(--transition), color var(--transition);
      text-decoration: none;
    }
    .nav-item:hover { background: var(--color-surface-offset); color: var(--color-text); text-decoration: none; }
    .nav-item.active { background: color-mix(in oklch, var(--color-primary) 12%, var(--color-surface)); color: var(--color-primary); }
    .nav-item i { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer { margin-top: auto; padding: var(--space-4); border-top: 1px solid var(--color-divider); }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-4) var(--space-6);
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
      position: sticky;
      top: 0;
      z-index: 10;
      gap: var(--space-4);
    }
    .topbar-left { display: flex; align-items: center; gap: var(--space-3); min-width: 0; }
    .topbar-title { font-size: var(--text-base); font-weight: 600; }
    .topbar-right { display: flex; align-items: center; gap: var(--space-2); flex-shrink: 0; }

    .page { padding: var(--space-6); flex: 1; }

    /* ── Buttons ──────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 500;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }
    .btn i { width: 14px; height: 14px; }

    .btn-primary {
      background: var(--color-primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--color-primary-hover); box-shadow: var(--shadow-sm); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
    }
    .btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-error);
    }
    .btn-danger:hover { background: var(--color-error-bg); border-color: var(--color-error); }

    .btn-icon {
      padding: var(--space-2);
      border-radius: var(--radius-md);
      background: transparent;
      color: var(--color-text-muted);
      transition: background var(--transition), color var(--transition);
    }
    .btn-icon:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .btn-icon i { width: 16px; height: 16px; display: block; }

    /* ── Badges ───────────────────────────────────────── */
    .badge {
      display: inline-flex; align-items: center; gap: var(--space-1);
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .badge-ativa    { background: var(--color-success-bg); color: var(--color-success); }
    .badge-ativa    .badge-dot { background: var(--color-success); }
    .badge-kyc      { background: var(--color-warning-bg); color: var(--color-warning); }
    .badge-kyc      .badge-dot { background: var(--color-warning); }
    .badge-bloqueada{ background: var(--color-error-bg);   color: var(--color-error);   }
    .badge-bloqueada.badge-dot { background: var(--color-error); }
    .badge-inativa  { background: var(--color-surface-offset); color: var(--color-text-muted); }
    .badge-inativa  .badge-dot { background: var(--color-text-faint); }
    .badge-pendente { background: var(--color-purple-bg); color: var(--color-purple); }
    .badge-pendente .badge-dot { background: var(--color-purple); }

    /* ── Search + Filters ─────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      margin-bottom: var(--space-5);
      flex-wrap: wrap;
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      flex: 1;
      min-width: 180px;
      max-width: 340px;
      transition: border-color var(--transition);
    }
    .search-wrap:focus-within { border-color: var(--color-primary); }
    .search-wrap i { width: 14px; height: 14px; color: var(--color-text-faint); flex-shrink: 0; }
    .search-wrap input {
      background: none;
      border: none;
      outline: none;
      font-size: var(--text-xs);
      color: var(--color-text);
      flex: 1;
    }
    .search-wrap input::placeholder { color: var(--color-text-faint); }

    .filter-btn {
      display: inline-flex; align-items: center; gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      font-size: var(--text-xs);
      font-weight: 500;
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      color: var(--color-text-muted);
      transition: all var(--transition);
      cursor: pointer;
    }
    .filter-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .filter-btn.active { background: color-mix(in oklch, var(--color-primary) 12%, var(--color-surface)); color: var(--color-primary); border-color: var(--color-primary); }
    .filter-btn .count {
      background: var(--color-surface-offset);
      border-radius: var(--radius-full);
      padding: 1px 6px;
      font-size: 10px;
    }
    .filter-btn.active .count { background: color-mix(in oklch, var(--color-primary) 20%, transparent); }

    .spacer { flex: 1; }

    /* ── Stats Bar ────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-5);
    }
    .stat-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-4);
    }
    .stat-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-bottom: var(--space-1); }
    .stat-value { font-size: var(--text-lg); font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat-value.green { color: var(--color-success); }
    .stat-value.yellow { color: var(--color-warning); }
    .stat-value.red { color: var(--color-error); }
    .stat-value.blue { color: var(--color-primary); }

    /* ── Table ────────────────────────────────────────── */
    .table-wrap {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .table-head {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr 1fr 1.2fr 1fr auto;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
      font-size: 11px;
      font-weight: 600;
      color: var(--color-text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .account-row {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr 1fr 1.2fr 1fr auto;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      align-items: center;
      transition: background var(--transition);
    }
    .account-row:last-child { border-bottom: none; }
    .account-row:hover { background: var(--color-surface-2); }

    .account-email {
      font-size: var(--text-xs);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .account-meta { font-size: var(--text-xs); color: var(--color-text-muted); }
    .account-cycle { font-size: var(--text-xs); font-variant-numeric: tabular-nums; font-weight: 600; }

    .row-actions { display: flex; gap: var(--space-1); }

    /* ── Empty State ──────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-8);
      color: var(--color-text-muted);
      text-align: center;
    }
    .empty-state i { width: 40px; height: 40px; color: var(--color-text-faint); margin-bottom: var(--space-4); }
    .empty-state h3 { color: var(--color-text); font-size: var(--text-base); margin-bottom: var(--space-2); }
    .empty-state p { font-size: var(--text-xs); max-width: 32ch; }

    /* ── Skeleton ─────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, var(--color-surface-offset) 25%, var(--color-surface-2) 50%, var(--color-surface-offset) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    .sk-row {
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr 1fr 1.2fr 1fr auto;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      align-items: center;
    }
    .sk-row > span { height: 14px; border-radius: var(--radius-sm); }

    /* ── Modal ────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: oklch(0 0 0 / 0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: var(--space-4);
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition);
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-6);
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      transform: translateY(8px);
      transition: transform var(--transition);
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--space-5);
    }
    .modal-title { font-size: var(--text-base); font-weight: 600; }

    .form-group { margin-bottom: var(--space-4); }
    .form-label { display: block; font-size: var(--text-xs); font-weight: 500; color: var(--color-text-muted); margin-bottom: var(--space-2); }
    .form-input {
      width: 100%;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      color: var(--color-text);
      outline: none;
      transition: border-color var(--transition);
    }
    .form-input:focus { border-color: var(--color-primary); }
    .form-input::placeholder { color: var(--color-text-faint); }
    textarea.form-input { resize: vertical; min-height: 80px; font-family: 'Courier New', monospace; font-size: 11px; }

    .form-select {
      width: 100%;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      color: var(--color-text);
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .form-select:focus { border-color: var(--color-primary); }

    .modal-footer {
      display: flex; justify-content: flex-end; gap: var(--space-2);
      margin-top: var(--space-5);
      padding-top: var(--space-4);
      border-top: 1px solid var(--color-divider);
    }

    /* ── Cookie Detail Modal ──────────────────────────── */
    .cookie-box {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: var(--color-text-muted);
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* ── Toast ────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: var(--space-6); right: var(--space-6);
      display: flex; flex-direction: column; gap: var(--space-2);
      z-index: 200; pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      font-size: var(--text-xs);
      font-weight: 500;
      pointer-events: all;
      animation: slide-in 200ms cubic-bezier(0.16,1,0.3,1) forwards;
      max-width: 320px;
    }
    @keyframes slide-in { from { opacity:0; transform:translateX(12px); } to { opacity:1; transform:translateX(0); } }
    .toast.success { border-color: var(--color-success); color: var(--color-success); }
    .toast.error   { border-color: var(--color-error);   color: var(--color-error);   }
    .toast.info    { border-color: var(--color-primary);  color: var(--color-primary);  }
    .toast i { width: 14px; height: 14px; }

    /* ── Pagination ───────────────────────────────────── */
    .pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-top: 1px solid var(--color-border);
    }
    .pagination-info { font-size: var(--text-xs); color: var(--color-text-muted); }
    .pagination-btns { display: flex; gap: var(--space-2); }

    /* ── Theme Toggle ─────────────────────────────────── */
    .theme-btn {
      background: var(--color-surface-offset);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-2);
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center;
    }
    .theme-btn:hover { color: var(--color-text); background: var(--color-surface); }

    /* ── Connection dot ───────────────────────────────── */
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
      background: var(--color-text-faint);
      transition: background var(--transition);
    }
    .conn-dot.online  { background: var(--color-success); box-shadow: 0 0 6px var(--color-success); }
    .conn-dot.offline { background: var(--color-error); }
    .conn-label { font-size: var(--text-xs); color: var(--color-text-muted); }

    /* ── Mobile ───────────────────────────────────────── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar { padding: var(--space-3) var(--space-4); }
      .page { padding: var(--space-4); }
      .table-head { display: none; }
      .account-row {
        grid-template-columns: 1fr;
        gap: var(--space-2);
        padding: var(--space-3);
      }
      .stats-bar { grid-template-columns: 1fr 1fr; }
      .toolbar { flex-direction: column; align-items: stretch; }
      .search-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

  <!-- ── Sidebar ────────────────────────────────────────── -->
  <aside class="sidebar" role="navigation" aria-label="Menu principal">
    <div class="sidebar-logo">
      <svg aria-label="Logo" width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect x="2" y="2" width="9" height="9" rx="2" fill="currentColor" opacity="0.9"/>
        <rect x="13" y="2" width="9" height="9" rx="2" fill="currentColor" opacity="0.5"/>
        <rect x="2" y="13" width="9" height="9" rx="2" fill="currentColor" opacity="0.5"/>
        <rect x="13" y="13" width="9" height="9" rx="2" fill="currentColor" opacity="0.2"/>
      </svg>
      <span>MVP Teste</span>
    </div>

    <nav>
      <a href="index.html"    class="nav-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
      <a href="index.html#config" class="nav-item"><i data-lucide="settings"></i> Configurações</a>
      <a href="index.html#logs"   class="nav-item"><i data-lucide="scroll-text"></i> Logs</a>
      <a href="accounts.html" class="nav-item active"><i data-lucide="users"></i> Contas Salvas</a>
      <a href="index.html#kyc"    class="nav-item"><i data-lucide="shield-alert"></i> KYC Detector</a>

  <!-- ── Toasts ─────────────────────────────────────────── -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <script>
    const BASE = 'https://murky-residual-outlast.ngrok-free.dev';
    const PASS = 'connect@10';

    const headers = {
      'Content-Type': 'application/json',
      'x-admin-password': PASS,
      'ngrok-skip-browser-warning': 'true'
    };

    // ── State ──────────────────────────────────────────────
    let allAccounts = [];
    let filtered    = [];
    let currentFilter = 'all';
    let searchQuery   = '';
    let currentPage   = 1;
    const PAGE_SIZE   = 15;
    let deleteTargetId = null;
    let cookieTargetAccount = null;
    let isOnline = false;

    // ── DOM refs ───────────────────────────────────────────
    const listEl      = document.getElementById('accountsList');
    const pagination  = document.getElementById('pagination');
    const paginationInfo = document.getElementById('paginationInfo');
    const btnPrev     = document.getElementById('btnPrev');
    const btnNext     = document.getElementById('btnNext');
    const searchInput = document.getElementById('searchInput');
    const topbarCount = document.getElementById('topbarCount');

    // Stats
    const statTotal  = document.getElementById('statTotal');
    const statAtiva  = document.getElementById('statAtiva');
    const statKyc    = document.getElementById('statKyc');
    const statBloq   = document.getElementById('statBloq');
    const statInativa= document.getElementById('statInativa');

    // Filter counts
    const cntAll    = document.getElementById('cntAll');
    const cntAtiva  = document.getElementById('cntAtiva');
    const cntKyc    = document.getElementById('cntKyc');
    const cntBloq   = document.getElementById('cntBloq');
    const cntInativa= document.getElementById('cntInativa');

    // ── Toast ──────────────────────────────────────────────
    function toast(msg, type = 'info', duration = 3000) {
      const tc = document.getElementById('toastContainer');
      const icons = { success: 'check-circle', error: 'x-circle', info: 'info' };
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.innerHTML = `<i data-lucide="${icons[type] || 'info'}"></i><span>${msg}</span>`;
      tc.appendChild(t);
      if (window.lucide) lucide.createIcons({ nodes: [t] });
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 200ms'; setTimeout(() => t.remove(), 200); }, duration);
    }

    // ── Connection check ───────────────────────────────────
    async function checkConnection() {
      try {
        const r = await fetch(`${BASE}/api/status`, { headers, signal: AbortSignal.timeout(4000) });
        isOnline = r.ok;
      } catch { isOnline = false; }
      ['topbarDot','sidebarDot'].forEach(id => {
        const el = document.getElementById(id);
        if (el) { el.className = 'conn-dot ' + (isOnline ? 'online' : 'offline'); }
      });
      ['topbarConnLabel','sidebarConnLabel'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = isOnline ? 'Online' : 'Offline';
      });
    }

    // ── Fetch accounts ─────────────────────────────────────
    async function fetchAccounts() {
      await checkConnection();
      if (!isOnline) {
        renderError('Backend offline. Verifique o ngrok.');
        return;
      }
      try {
        const r = await fetch(`${BASE}/api/accounts`, { headers });
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const data = await r.json();
        allAccounts = data.accounts || [];
        applyFilters();
      } catch (e) {
        renderError('Erro ao carregar contas: ' + e.message);
      }
    }

    // ── Filters ────────────────────────────────────────────
    function applyFilters() {
      const q = searchQuery.toLowerCase();
      filtered = allAccounts.filter(a => {
        const matchFilter = currentFilter === 'all' || (a.status || 'ativa') === currentFilter;
        const matchSearch = !q ||
          (a.email  || '').toLowerCase().includes(q) ||
          (a.nome   || '').toLowerCase().includes(q) ||
          (a.provider || '').toLowerCase().includes(q) ||
          (a.localizacao || '').toLowerCase().includes(q);
        return matchFilter && matchSearch;
      });
      updateCounts();
      currentPage = 1;
      render();
    }

    function updateCounts() {
      const byStatus = s => allAccounts.filter(a => (a.status || 'ativa') === s).length;
      cntAll.textContent    = allAccounts.length;
      cntAtiva.textContent  = byStatus('ativa');
      cntKyc.textContent    = byStatus('kyc');
      cntBloq.textContent   = byStatus('bloqueada');
      cntInativa.textContent= byStatus('inativa');

      animateNumber(statTotal,  allAccounts.length);
      animateNumber(statAtiva,  byStatus('ativa'));
      animateNumber(statKyc,    byStatus('kyc'));
      animateNumber(statBloq,   byStatus('bloqueada'));
      animateNumber(statInativa,byStatus('inativa'));

      topbarCount.textContent = `${allAccounts.length} conta${allAccounts.length !== 1 ? 's' : ''}`;
    }

    function animateNumber(el, target) {
      const start = parseInt(el.textContent) || 0;
      if (start === target) { el.textContent = target; return; }
      const dur = 400, step = 16;
      let t = 0;
      const interval = setInterval(() => {
        t += step;
        const progress = Math.min(t / dur, 1);
        const ease = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(start + (target - start) * ease);
        if (progress >= 1) clearInterval(interval);
      }, step);
    }

    // ── Render ─────────────────────────────────────────────
    function render() {
      const total = filtered.length;
      const pages = Math.ceil(total / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const slice = filtered.slice(start, start + PAGE_SIZE);

      if (total === 0) {
        listEl.innerHTML = '';
        const e = document.createElement('div');
        e.className = 'empty-state';
        e.innerHTML = `
          <i data-lucide="users"></i>
          <h3>Nenhuma conta encontrada</h3>
          <p>${searchQuery || currentFilter !== 'all' ? 'Tente outro filtro ou busca.' : 'Ainda não há contas salvas. Inicie o loop para gerar.'}</p>
        `;
        listEl.appendChild(e);
        pagination.style.display = 'none';
        if (window.lucide) lucide.createIcons({ nodes: [e] });
        return;
      }

      listEl.innerHTML = slice.map(a => accountRowHTML(a)).join('');
      if (window.lucide) lucide.createIcons({ nodes: [listEl] });

      // Bind row events
      listEl.querySelectorAll('[data-del]').forEach(btn => {
        btn.addEventListener('click', () => openDeleteModal(btn.dataset.del, btn.dataset.email));
      });
      listEl.querySelectorAll('[data-cookies]').forEach(btn => {
        btn.addEventListener('click', () => openCookieModal(btn.dataset.cookies, btn.dataset.email));
      });
      listEl.querySelectorAll('[data-copy-email]').forEach(btn => {
        btn.addEventListener('click', () => { navigator.clipboard.writeText(btn.dataset.copyEmail); toast('Email copiado!', 'success'); });
      });
      listEl.querySelectorAll('[data-status-id]').forEach(btn => {
        btn.addEventListener('click', () => cycleStatus(btn.dataset.statusId));
      });

      // Pagination
      paginationInfo.textContent = `${start + 1}–${Math.min(start + PAGE_SIZE, total)} de ${total}`;
      btnPrev.disabled = currentPage <= 1;
      btnNext.disabled = currentPage >= pages;
      pagination.style.display = 'flex';
    }

    function statusBadge(status) {
      const s = (status || 'ativa').toLowerCase();
      const map = {
        ativa:     ['badge-ativa',     'Ativa'],
        kyc:       ['badge-kyc',       'KYC'],
        bloqueada: ['badge-bloqueada', 'Bloqueada'],
        inativa:   ['badge-inativa',   'Inativa'],
        pendente:  ['badge-pendente',  'Pendente'],
      };
      const [cls, label] = map[s] || ['badge-inativa', s];
      return `<span class="badge ${cls}" title="Clique para alterar status"><span class="badge-dot"></span>${label}</span>`;
    }

    function accountRowHTML(a) {
      const date = a.createdAt ? new Date(a.createdAt).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' }) : '—';
      const nome = [a.nome, a.sobrenome].filter(Boolean).join(' ') || '—';
      const hasCookies = Array.isArray(a.cookies) && a.cookies.length > 0;
      const cookiesData = hasCookies ? encodeURIComponent(JSON.stringify(a.cookies, null, 2)) : '';

      return `
        <div class="account-row" data-id="${a.id}">
          <div style="min-width:0">
            <div class="account-email" title="${a.email}">${a.email || '—'}</div>
            <div class="account-meta">${nome}</div>
          </div>
          <div class="account-meta">${a.provider || '—'}</div>
          <div class="account-cycle">#${a.cycle ?? '—'}</div>
          <div>
            <button data-status-id="${a.id}" style="background:none;border:none;cursor:pointer;padding:0">
              ${statusBadge(a.status)}
            </button>
          </div>
          <div class="account-meta">${date}</div>
          <div class="account-meta" title="${a.localizacao || ''}">${(a.localizacao || '—').substring(0, 14)}${(a.localizacao||'').length > 14 ? '…' : ''}</div>
          <div class="row-actions">
            <button class="btn-icon" data-copy-email="${a.email}" title="Copiar email" aria-label="Copiar email">
              <i data-lucide="mail"></i>
            </button>
            ${hasCookies ? `
            <button class="btn-icon" data-cookies="${cookiesData}" data-email="${a.email}" title="Ver cookies" aria-label="Ver cookies">
              <i data-lucide="cookie"></i>
            </button>` : ''}
            <button class="btn-icon btn-danger" data-del="${a.id}" data-email="${a.email}" title="Remover conta" aria-label="Remover conta">
              <i data-lucide="trash-2"></i>
            </button>
          </div>
        </div>
      `;
    }

    function renderError(msg) {
      listEl.innerHTML = `
        <div class="empty-state">
          <i data-lucide="wifi-off"></i>
          <h3>Erro de conexão</h3>
          <p>${msg}</p>
        </div>
      `;
      pagination.style.display = 'none';
      if (window.lucide) lucide.createIcons({ nodes: [listEl] });
    }

    // ── Cycle status locally (optimistic) ─────────────────
    function cycleStatus(id) {
      const order = ['ativa','kyc','bloqueada','inativa'];
      const acc = allAccounts.find(a => a.id === id);
      if (!acc) return;
      const cur = order.indexOf(acc.status || 'ativa');
      acc.status = order[(cur + 1) % order.length];
      applyFilters();
      toast(`Status alterado para "${acc.status}"`, 'info');
    }

    // ── Add account ────────────────────────────────────────
    async function addAccount() {
      const email = document.getElementById('addEmail').value.trim();
      if (!email) { toast('Email obrigatório', 'error'); return; }

      let cookies = [];
      const rawCookies = document.getElementById('addCookies').value.trim();
      if (rawCookies) {
        try { cookies = JSON.parse(rawCookies); }
        catch { toast('JSON de cookies inválido', 'error'); return; }
      }

      const payload = {
        email,
        nome:            document.getElementById('addNome').value.trim(),
        sobrenome:       document.getElementById('addSobrenome').value.trim(),
        provider:        document.getElementById('addProvider').value,
        status:          document.getElementById('addStatus').value,
        cookies,
        cycle: 0,
        telefone: '', senha: '', localizacao: '', codigoIndicacao: ''
      };

      try {
        const r = await fetch(`${BASE}/api/accounts`, {
          method: 'POST',
          headers,
          body: JSON.stringify(payload)
        });
        if (r.status === 404) {
          // endpoint POST não existe no backend atual — inserir localmente como demo
          const fakeAcc = { id: crypto.randomUUID(), createdAt: new Date().toISOString(), ...payload };
          allAccounts.unshift(fakeAcc);
          applyFilters();
          toast('Conta adicionada (modo local)', 'success');
        } else if (!r.ok) {
          throw new Error(`HTTP ${r.status}`);
        } else {
          await fetchAccounts();
          toast('Conta adicionada!', 'success');
        }
      } catch (e) {
        // Fallback local
        const fakeAcc = { id: crypto.randomUUID(), createdAt: new Date().toISOString(), ...payload };
        allAccounts.unshift(fakeAcc);
        applyFilters();
        toast('Conta adicionada (modo local)', 'success');
      }

      closeModal('addModal');
      clearAddForm();
    }

    function clearAddForm() {
      ['addEmail','addNome','addSobrenome','addCookies'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('addProvider').value = 'temp-mail.io';
      document.getElementById('addStatus').value   = 'ativa';
    }

    // ── Delete account ─────────────────────────────────────
    function openDeleteModal(id, email) {
      deleteTargetId = id;
      document.getElementById('deleteAccountEmail').textContent = email;
      openModal('deleteModal');
    }

    async function deleteAccount() {
      if (!deleteTargetId) return;
      try {
        const r = await fetch(`${BASE}/api/accounts/${deleteTargetId}`, { method: 'DELETE', headers });
        if (!r.ok && r.status !== 404) throw new Error(`HTTP ${r.status}`);
      } catch (e) {
        console.warn('DELETE failed, removing locally', e);
      }
      allAccounts = allAccounts.filter(a => a.id !== deleteTargetId);
      applyFilters();
      toast('Conta removida', 'success');
      closeModal('deleteModal');
      deleteTargetId = null;
    }

    // ── Cookie modal ───────────────────────────────────────
    function openCookieModal(cookiesEncoded, email) {
      document.getElementById('cookieEmail').textContent = email;
      try {
        const json = decodeURIComponent(cookiesEncoded);
        document.getElementById('cookieContent').textContent = json;
        cookieTargetAccount = json;
      } catch {
        document.getElementById('cookieContent').textContent = '(erro ao decodificar)';
      }
      openModal('cookieModal');
    }

    // ── Export CSV ─────────────────────────────────────────
    function exportCSV() {
      const rows = [['ID','Email','Nome','Sobrenome','Provider','Ciclo','Status','Criado em','Localização']];
      allAccounts.forEach(a => rows.push([
        a.id, a.email, a.nome, a.sobrenome, a.provider,
        a.cycle, a.status || 'ativa', a.createdAt, a.localizacao
      ]));
      const csv = rows.map(r => r.map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `contas_${new Date().toISOString().split('T')[0]}.csv`;
      a.click();
      toast('CSV exportado!', 'success');
    }

    // ── Modal helpers ──────────────────────────────────────
    function openModal(id)  { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    // ── Event listeners ────────────────────────────────────
    document.getElementById('btnRefresh').addEventListener('click', fetchAccounts);
    document.getElementById('btnAddAccount').addEventListener('click', () => openModal('addModal'));
    document.getElementById('closeAddModal').addEventListener('click', () => closeModal('addModal'));
    document.getElementById('cancelAddModal').addEventListener('click', () => closeModal('addModal'));
    document.getElementById('confirmAddAccount').addEventListener('click', addAccount);

    document.getElementById('closeDeleteModal').addEventListener('click', () => closeModal('deleteModal'));
    document.getElementById('cancelDeleteModal').addEventListener('click', () => closeModal('deleteModal'));
    document.getElementById('confirmDeleteBtn').addEventListener('click', deleteAccount);

    document.getElementById('closeCookieModal').addEventListener('click', () => closeModal('cookieModal'));
    document.getElementById('closeCookieModal2').addEventListener('click', () => closeModal('cookieModal'));
    document.getElementById('copyCookieBtn').addEventListener('click', () => {
      if (cookieTargetAccount) {
        navigator.clipboard.writeText(cookieTargetAccount);
        toast('Cookies copiados!', 'success');
      }
    });

    document.getElementById('btnExport').addEventListener('click', exportCSV);

    searchInput.addEventListener('input', e => { searchQuery = e.target.value; applyFilters(); });

    document.querySelectorAll('[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFilter = btn.dataset.filter;
        document.querySelectorAll('[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        applyFilters();
      });
    });

    btnPrev.addEventListener('click', () => { if (currentPage > 1) { currentPage--; render(); } });
    btnNext.addEventListener('click', () => { currentPage++; render(); });

    // Close modals on overlay click
    ['addModal','cookieModal','deleteModal'].forEach(id => {
      document.getElementById(id).addEventListener('click', e => {
        if (e.target === e.currentTarget) closeModal(id);
      });
    });

    // Theme toggle
    const themeToggle = document.getElementById('themeToggle');
    let currentTheme = 'dark';
    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', currentTheme);
      themeToggle.innerHTML = currentTheme === 'dark'
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    });

    // Keyboard: Escape closes modals
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') ['addModal','cookieModal','deleteModal'].forEach(closeModal);
    });

    // ── Init ───────────────────────────────────────────────
    window.addEventListener('load', () => {
      if (window.lucide) lucide.createIcons();
      fetchAccounts();
      setInterval(checkConnection, 30000);
    });
  </script>
</body>
</html>
