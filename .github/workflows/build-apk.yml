name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: mobile
        run: npm install

      - name: Init Capacitor Android
        working-directory: mobile
        run: |
          npx cap init "MVP Bot" "com.mvp.automation" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Listar APKs gerados
        run: |
          echo "=== Procurando APKs em mobile/ ==="
          find mobile -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado em mobile/"
          echo "=== Procurando APKs em todo o workspace ==="
          find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"
          echo "=== Estrutura de mobile/android/app/build ==="
          ls -la mobile/android/app/build/outputs/ 2>/dev/null || echo "Pasta outputs nao existe"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mvp-bot-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
