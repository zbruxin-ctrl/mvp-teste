name: Build APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Python deps
        run: pip install pillow

      - name: Generate icon and splash
        working-directory: mobile
        run: python3 resources/generate-assets.py

      - name: Install Capacitor dependencies
        working-directory: mobile
        run: npm install

      - name: Install @capacitor/assets
        working-directory: mobile
        run: npm install -D @capacitor/assets

      - name: Init Capacitor Android
        working-directory: mobile
        run: |
          npx cap init "ConnectDroid" "com.mvp.automation" --web-dir www
          npx cap add android
          npx cap sync android

      - name: Generate Android assets
        working-directory: mobile
        run: npx capacitor-assets generate --android

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Listar APKs gerados
        run: |
          find . -name "*.apk" 2>/dev/null || echo "Nenhum APK encontrado"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: connectdroid-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
