name: Rodar Bot Uber

on:
  workflow_dispatch:
    inputs:
      ciclos:
        description: 'Quantidade de ciclos para rodar'
        required: true
        default: '1'
        type: string
      email_provider:
        description: 'Provedor de email temp'
        required: true
        default: 'tempmailc'
        type: choice
        options:
          - tempmailc
          - yopmail
      invite_code:
        description: 'Codigo de convite (opcional)'
        required: false
        default: ''
        type: string
      otp_timeout:
        description: 'Timeout para OTP em segundos'
        required: false
        default: '120'
        type: string

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependencias do sistema para Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-0 \
            libnss3 \
            libnspr4 \
            libdbus-1-3 \
            libatk1.0-0 \
            libatk-bridge2.0-0 \
            libcups2 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpango-1.0-0 \
            libcairo2 \
            libatspi2.0-0

      - name: Instalar dependencias npm
        run: npm ci

      - name: Instalar Chromium via Playwright
        run: npx playwright install chromium

      - name: Build do projeto
        run: npm run build

      - name: Rodar bot
        env:
          BOT_CICLOS: ${{ github.event.inputs.ciclos }}
          BOT_EMAIL_PROVIDER: ${{ github.event.inputs.email_provider }}
          BOT_INVITE_CODE: ${{ github.event.inputs.invite_code }}
          BOT_OTP_TIMEOUT: ${{ github.event.inputs.otp_timeout }}
          BOT_HEADLESS: 'true'
          BOT_CADASTRO_URL: 'https://bonjour.uber.com/'
          TEMP_MAIL_API_KEY: ${{ secrets.TEMP_MAIL_API_KEY }}
        run: node scripts/run-bot.js

      - name: Upload de artefatos (contas criadas)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contas-criadas-${{ github.run_number }}
          path: |
            accounts.json
            artifacts/
          if-no-files-found: ignore
          retention-days: 30
